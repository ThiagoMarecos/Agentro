[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    security: Security-related tests
    slow: Tests that may take longer (timing, brute-force simulations)

# Output
addopts =
    -v
    --tb=short
    --no-header
    -rN

# Logging
log_cli = true
log_cli_level = WARNING
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
